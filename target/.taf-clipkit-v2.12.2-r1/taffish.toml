[package]
name = "clipkit"
kind = "tool"
version = "2.12.2"
release = 1
license = "Apache-2.0"
main = "src/main.taf"

[repository]
url = "https://github.com/taffish/clipkit"

[command]
name = "taf-clipkit"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/clipkit:2.12.2-r1"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64,linux/arm64"

[meta]
domain = "bio"
categories = ["multiple-sequence-alignment", "alignment-trimming", "phylogenetics", "sequence-analysis"]
keywords = ["ClipKIT", "clipkit", "MSA", "alignment trimming", "smart-gap", "gappy", "kpic", "phylogenomics", "ecomp"]
description = "Alignment trimming software for phylogenetics and phylogenomics."

[upstream]
name = "ClipKIT"
type = "github"
repo = "JLSteenwyk/ClipKIT"
homepage = "https://jlsteenwyk.com/ClipKIT/"
release_url = "https://github.com/JLSteenwyk/ClipKIT/releases/tag/v2.12.2"
downloads = "https://files.pythonhosted.org/packages/e8/d7/e5920b04122002d77f9c3026d0fa0c94c24e276b6b1f02a0405039e0e10a/clipkit-2.12.2-py3-none-any.whl; https://files.pythonhosted.org/packages/1d/cc/5cc05e2117f097ab8aab447b968d2d3f188b1fcc3c8c6b49d2c23ae4b2dc/clipkit-2.12.2.tar.gz; https://raw.githubusercontent.com/JLSteenwyk/ClipKIT/v2.12.2/test.ecomp"
version = "2.12.2"
commit = "fa656cb6532aa3fb4c22ecef3b44721c658e283d"
license = "MIT"
citation = "Steenwyk et al. 2020, ClipKIT: a multiple sequence alignment trimming software for accurate phylogenomic inference"
doi = "10.1371/journal.pbio.3001007"
watch = "tags"
strip_prefix = "v"

[smoke]
backend = "docker"
timeout = 180
exist = ["clipkit", "python", "python3", "bash", "grep", "sed", "gzip", "ldd"]
test = ["clipkit --version | grep -Fx 'clipkit 2.12.2' >/dev/null && clipkit --help 2>&1 | grep -F 'Usage: clipkit <input>' >/dev/null && clipkit --help 2>&1 | grep -F 'smart-gap' >/dev/null && python -c 'import Bio, clipkit, numpy, zstandard; from clipkit.version import __version__; assert __version__ == \"2.12.2\"' && grep -F 'commit=fa656cb6532aa3fb4c22ecef3b44721c658e283d' /opt/clipkit/share/doc/clipkit/source.txt >/dev/null && grep -F 'wheel_sha256=b9074ba75ef0a1217b2c4c7aed36ca927c3664117d59f28a9844cc539c6c0630' /opt/clipkit/share/doc/clipkit/source.txt >/dev/null && grep -F 'source_sha256=bdc1e7f0d8da34e8a8622715de7203edf51da47d8163cc78799b923a7be0e2b4' /opt/clipkit/share/doc/clipkit/source.txt >/dev/null && grep -F 'ecomp_sha256=f9f9b2a1084757586a797708a5198156347164516393462a04a5cd624d568065' /opt/clipkit/share/doc/clipkit/source.txt >/dev/null && find /opt/clipkit/venv -type f -name '*.so' -print0 | xargs -0 -r ldd > /tmp/taf-clipkit-ldd.txt && ! grep -F 'not found' /tmp/taf-clipkit-ldd.txt >/dev/null", "tmp=/tmp/taf-clipkit-trim-$$; rm -rf \"$tmp\"; mkdir -p \"$tmp\"; cd \"$tmp\"; printf '>s1\nACGTACGT\n>s2\nACGTA-GT\n>s3\nACGTA-GT\n>s4\nACGTA-GT\n' > in.fa && clipkit in.fa -m gappy -g 0.5 -o out.fa -of fasta -l -c --report_json report.json --plot_trim_report report.html > run.log 2>&1 && test -s out.fa && test -s out.fa.log && test -s out.fa.complement && test -s report.json && test -s report.html && grep -F '>s1' out.fa >/dev/null && grep -F 'Trimmed alignment: out.fa' run.log >/dev/null && python -c 'import json; data=json.load(open(\"report.json\")); assert data[\"status\"] == \"completed\"; assert data[\"mode\"] == \"gappy\"' && rm -rf \"$tmp\"", "tmp=/tmp/taf-clipkit-validate-$$; rm -rf \"$tmp\"; mkdir -p \"$tmp\"; cd \"$tmp\"; printf '>s1\nACGTACGTACGT\n>s2\nACGTACGTACGT\n>s3\nACGTA-GTACGT\n' > in.fa && clipkit in.fa --validate_only --report_json validate.json > validate.log 2>&1 && test -s validate.json && grep -F 'Validation successful' validate.log >/dev/null && python -c 'import json; data=json.load(open(\"validate.json\")); assert data[\"status\"] == \"validated\"; assert data[\"validate_only\"] is True' && rm -rf \"$tmp\"", "tmp=/tmp/taf-clipkit-ecomp-$$; rm -rf \"$tmp\"; mkdir -p \"$tmp\"; cd \"$tmp\"; cp /opt/clipkit/share/doc/clipkit/test.ecomp in.ecomp && clipkit in.ecomp -o out.fa -of fasta --report_json ecomp.json -q && test -s out.fa && test -s ecomp.json && python -c 'import json; data=json.load(open(\"ecomp.json\")); assert data[\"status\"] == \"completed\"; assert data[\"output_file_format\"] == \"fasta\"' && rm -rf \"$tmp\"", "python -c 'import numpy as np; from clipkit.msa import MSA; n=1024; records=np.full((n,n), \"A\", dtype=\"U1\"); records[:512,0]=\"-\"; records[512:768,0]=\"C\"; msa=MSA([{\"id\":str(i)} for i in range(n)], records, gap_chars=[\"-\"]); assert records.size > 1000000; assert msa.site_gappyness[0] == 0.5; assert msa.site_entropy[0] == 1.0; assert msa.site_composition_bias[0] == 0.0; assert msa.column_character_frequencies[0] == {\"A\":256, \"C\":256}'"]
