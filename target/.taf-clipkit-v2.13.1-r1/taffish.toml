[package]
name = "clipkit"
kind = "tool"
version = "2.13.1"
release = 1
license = "Apache-2.0"
main = "src/main.taf"

[repository]
url = "https://github.com/taffish/clipkit"

[command]
name = "taf-clipkit"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/clipkit:2.13.1-r1"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64,linux/arm64"

[meta]
domain = "bio"
categories = ["multiple-sequence-alignment", "alignment-trimming", "phylogenetics", "sequence-analysis"]
keywords = ["ClipKIT", "clipkit", "MSA", "alignment trimming", "smart-gap", "gappy", "kpic", "phylogenomics", "ecomp", "stop-codon masking", "codon-aware"]
description = "Alignment trimming software for phylogenetics and phylogenomics."

[upstream]
name = "ClipKIT"
type = "github"
repo = "JLSteenwyk/ClipKIT"
homepage = "https://jlsteenwyk.com/ClipKIT/"
release_url = "https://github.com/JLSteenwyk/ClipKIT/releases/tag/v2.13.1"
downloads = "https://files.pythonhosted.org/packages/47/59/a072789f2b83555bfa867f7d510f8a91313094f64e35e2e6c037b4c543ab/clipkit-2.13.1-py3-none-any.whl; https://files.pythonhosted.org/packages/0c/3f/d9169a32b23ab2f2e26ea4fbf26246efea5b8e5f1feddb6ce77020c034e3/clipkit-2.13.1.tar.gz; https://raw.githubusercontent.com/JLSteenwyk/ClipKIT/v2.13.1/test.ecomp"
version = "2.13.1"
commit = "f23400a20da3ad69908fd48f5786f8bb626f8bbd"
license = "MIT"
citation = "Steenwyk et al. 2020, ClipKIT: a multiple sequence alignment trimming software for accurate phylogenomic inference"
doi = "10.1371/journal.pbio.3001007"
watch = "tags"
strip_prefix = "v"

[smoke]
backend = "docker"
timeout = 180
exist = ["clipkit", "python", "python3", "bash", "grep", "sed", "gzip", "ldd"]
test = ["clipkit --version | grep -Fx 'clipkit 2.13.1' >/dev/null && clipkit --help 2>&1 | grep -F 'Usage: clipkit <input>' >/dev/null && clipkit --help 2>&1 | grep -F 'smart-gap' >/dev/null && clipkit --help 2>&1 | grep -F 'remove_stop_codons' >/dev/null && python -c 'import Bio, clipkit, numpy, zstandard; from clipkit.version import __version__; assert __version__ == \"2.13.1\"' && python -c 'assert open(\"/opt/clipkit/share/doc/clipkit/python-packages.txt\").read().splitlines() == [\"biopython==1.87\", \"clipkit==2.13.1\", \"numpy==1.26.4\", \"zstandard==0.25.0\"]' && grep -F 'commit=f23400a20da3ad69908fd48f5786f8bb626f8bbd' /opt/clipkit/share/doc/clipkit/source.txt >/dev/null && grep -F 'wheel_sha256=f3d5736fcfc3988e87aa198bd0d2eb3d41315724b26c0c35276bf16bdd5569fb' /opt/clipkit/share/doc/clipkit/source.txt >/dev/null && grep -F 'source_sha256=89a4f5a6cc0b7a0cc9681d83d6ba504d75b17b3a304990dcabe0141a85b8e27c' /opt/clipkit/share/doc/clipkit/source.txt >/dev/null && grep -F 'ecomp_sha256=f9f9b2a1084757586a797708a5198156347164516393462a04a5cd624d568065' /opt/clipkit/share/doc/clipkit/source.txt >/dev/null && find /opt/clipkit/venv -type f -name '*.so' -print0 | xargs -0 -r ldd > /tmp/taf-clipkit-ldd.txt && ! grep -F 'not found' /tmp/taf-clipkit-ldd.txt >/dev/null", "tmp=/tmp/taf-clipkit-stop-$$; rm -rf \"$tmp\"; mkdir -p \"$tmp\"; cd \"$tmp\"; printf '>stop\nATGTAATGA\n>control\nATGCAACAA\n' > in.fa && clipkit in.fa --mode gappy --gaps 0.9 --sequence_type nt --codon --remove_stop_codons all --output out.fa --output_file_format fasta --log --report_json report.json > run.log 2>&1 && test -s out.fa && test -s out.fa.log && test -s report.json && grep -F 'ATG------' out.fa >/dev/null && grep -F 'Stop codon masking mode: all' run.log >/dev/null && python -c 'import json; data=json.load(open(\"report.json\")); assert data[\"stop_codon_masking\"] == {\"mode\": \"all\", \"terminal_masked\": 1, \"internal_masked\": 1, \"total_masked\": 2}' && rm -rf \"$tmp\"", "tmp=/tmp/taf-clipkit-trim-$$; rm -rf \"$tmp\"; mkdir -p \"$tmp\"; cd \"$tmp\"; printf '>s1\nACGTACGT\n>s2\nACGTA-GT\n>s3\nACGTA-GT\n>s4\nACGTA-GT\n' > in.fa && clipkit in.fa -m gappy -g 0.5 -o out.fa -of fasta -l -c --report_json report.json --plot_trim_report report.html > run.log 2>&1 && test -s out.fa && test -s out.fa.log && test -s out.fa.complement && test -s report.json && test -s report.html && grep -F '>s1' out.fa >/dev/null && grep -F 'Trimmed alignment: out.fa' run.log >/dev/null && python -c 'import json; data=json.load(open(\"report.json\")); assert data[\"status\"] == \"completed\"; assert data[\"mode\"] == \"gappy\"' && rm -rf \"$tmp\"", "tmp=/tmp/taf-clipkit-validate-$$; rm -rf \"$tmp\"; mkdir -p \"$tmp\"; cd \"$tmp\"; printf '>s1\nACGTACGTACGT\n>s2\nACGTACGTACGT\n>s3\nACGTA-GTACGT\n' > in.fa && clipkit in.fa --validate_only --report_json validate.json > validate.log 2>&1 && test -s validate.json && grep -F 'Validation successful' validate.log >/dev/null && python -c 'import json; data=json.load(open(\"validate.json\")); assert data[\"status\"] == \"validated\"; assert data[\"validate_only\"] is True' && rm -rf \"$tmp\"", "tmp=/tmp/taf-clipkit-ecomp-$$; rm -rf \"$tmp\"; mkdir -p \"$tmp\"; cd \"$tmp\"; cp /opt/clipkit/share/doc/clipkit/test.ecomp in.ecomp && clipkit in.ecomp -o out.fa -of fasta --report_json ecomp.json -q && test -s out.fa && test -s ecomp.json && python -c 'import json; data=json.load(open(\"ecomp.json\")); assert data[\"status\"] == \"completed\"; assert data[\"output_file_format\"] == \"fasta\"' && rm -rf \"$tmp\"", "python -c 'import numpy as np; from clipkit.msa import MSA; n=1024; records=np.full((n,n), \"A\", dtype=\"U1\"); records[:512,0]=\"-\"; records[512:768,0]=\"C\"; msa=MSA([{\"id\":str(i)} for i in range(n)], records, gap_chars=[\"-\"]); assert records.size > 1000000; assert msa.site_gappyness[0] == 0.5; assert msa.site_entropy[0] == 1.0; assert msa.site_composition_bias[0] == 0.0; assert msa.column_character_frequencies[0] == {\"A\":256, \"C\":256}'", "python -c 'import numpy as np; from clipkit.modes import TrimmingMode; from clipkit.msa import MSA; headers=[{\"id\":str(i)} for i in range(4)]; upper=np.array([list(s) for s in [\"AA-CGT\", \"AC-CGT\", \"CAAC-T\", \"CCAG-T\"]], dtype=\"U1\"); mixed=upper.copy(); mixed[0,1]=\"a\"; upper_msa=MSA(headers, upper, gap_chars=[\"-\"]); mixed_msa=MSA(headers, mixed, gap_chars=[\"-\"], requires_uppercase_normalization=True); upper_msa.trim(mode=TrimmingMode.kpic_gappy, gap_threshold=0.5); mixed_msa.trim(mode=TrimmingMode.kpic_gappy, gap_threshold=0.5); assert [\"\".join(row) for row in upper_msa.sites_kept.tolist()] == [\"AAT\", \"ACT\", \"CAT\", \"CCT\"]; assert [\"\".join(row) for row in mixed_msa.sites_kept.tolist()] == [\"AaT\", \"ACT\", \"CAT\", \"CCT\"]; assert upper_msa.site_gappyness.tolist() == mixed_msa.site_gappyness.tolist() == [0.0, 0.0, 0.5, 0.0, 0.5, 0.0]'", "python -c 'from clipkit import clipkit; run, stats = clipkit(raw_alignment=\">stop\\nATGTAAACCTGA\\n>control\\nATGCAAACCCAA\\n\", mode=\"gappy\", gaps=0.9, sequence_type=\"nt\", codon=True, remove_stop_codons=\"all\"); assert str(run.trimmed[0].seq) == \"ATG---ACC---\"; assert run.stop_codon_masking.summary == {\"mode\": \"all\", \"terminal_masked\": 1, \"internal_masked\": 1, \"total_masked\": 2}; assert stats.output_length == 12'"]
